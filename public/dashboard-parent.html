<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fusion Coaching - Parent Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root {
      --primary: #f59e0b; --primary-dark: #d97706; --primary-light: #fbbf24;
      --primary-gradient: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
      --success: #10b981; --danger: #ef4444; --gold: #f59e0b;
      --bg: #f1f5f9; --bg-card: #ffffff; --sidebar: #0f172a;
      --text: #0f172a; --text-secondary: #475569; --text-light: #94a3b8;
      --border: #e2e8f0; --shadow: 0 4px 20px rgba(0,0,0,0.06);
      --radius: 12px; --radius-lg: 20px;
      --font: 'Inter', sans-serif; --font-heading: 'Poppins', 'Inter', sans-serif;
    }
    [data-theme="dark"] {
      --bg: #0b1120; --bg-card: #1e293b; --sidebar: #020617;
      --text: #f1f5f9; --text-secondary: #94a3b8; --text-light: #64748b;
      --border: #1e293b; --shadow: 0 4px 20px rgba(0,0,0,0.4);
      --primary: #fbbf24; --primary-dark: #f59e0b;
      --primary-gradient: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: var(--font); background: var(--bg); color: var(--text); overflow-x: hidden; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--text-light); border-radius: 3px; }

    .dash-wrapper { display: flex; min-height: 100vh; }
    .sidebar {
      width: 250px; background: var(--sidebar); color: #fff; position: fixed;
      top: 0; left: 0; height: 100vh; z-index: 100; display: flex;
      flex-direction: column; transition: transform 0.3s;
    }
    .sidebar-brand { padding: 24px 20px; border-bottom: 1px solid rgba(255,255,255,0.08); display: flex; align-items: center; gap: 10px; }
    .sidebar-brand h2 { font-family: var(--font-heading); font-size: 20px; font-weight: 700; }
    .sidebar-brand span { font-size: 11px; opacity: 0.6; }
    .sidebar-nav { flex: 1; padding: 16px 12px; overflow-y: auto; }
    .sidebar-nav a {
      display: flex; align-items: center; gap: 12px; padding: 10px 14px;
      border-radius: 10px; color: rgba(255,255,255,0.7); font-size: 14px;
      font-weight: 500; transition: all 0.3s; text-decoration: none;
    }
    .sidebar-nav a:hover, .sidebar-nav a.active { background: rgba(245,158,11,0.3); color: #fff; }
    .sidebar-nav a i { width: 20px; text-align: center; }
    .sidebar-footer { padding: 16px 12px; border-top: 1px solid rgba(255,255,255,0.08); }
    .sidebar-footer a { display: flex; align-items: center; gap: 10px; padding: 10px; border-radius: 10px; color: rgba(255,255,255,0.7); font-size: 14px; text-decoration: none; }
    .sidebar-footer a:hover { background: rgba(239,68,68,0.2); color: var(--danger); }

    .main-content { flex: 1; margin-left: 250px; padding: 24px; min-height: 100vh; }

    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 24px; padding: 16px 24px; background: var(--bg-card);
      border-radius: var(--radius); box-shadow: var(--shadow);
    }
    .topbar-left { display: flex; align-items: center; gap: 16px; }
    .topbar-left h1 { font-family: var(--font-heading); font-size: 20px; font-weight: 700; }
    .topbar-right { display: flex; align-items: center; gap: 12px; }
    .topbar-right .user-avatar { width: 38px; height: 38px; border-radius: 50%; background: var(--primary-gradient); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 14px; font-weight: 600; }
    .hamburger { display: none; background: none; border: none; font-size: 22px; color: var(--text); cursor: pointer; }

    .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .stat-card { background: var(--bg-card); border-radius: var(--radius); padding: 18px; box-shadow: var(--shadow); text-align: center; }
    .stat-card h3 { font-size: 28px; font-weight: 800; background: var(--primary-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .stat-card p { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }

    .section-card { background: var(--bg-card); border-radius: var(--radius-lg); padding: 24px; box-shadow: var(--shadow); margin-bottom: 20px; }
    .section-card h3 { font-size: 18px; font-weight: 600; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; }
    .section-card h3 i { color: var(--primary); }

    .child-card {
      background: var(--bg-card); border: 1.5px solid var(--border);
      border-radius: var(--radius-lg); padding: 24px; margin-bottom: 20px;
      transition: all 0.3s;
    }
    .child-card:hover { box-shadow: var(--shadow); border-color: var(--primary-light); }
    .child-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .child-header h2 { font-family: var(--font-heading); font-size: 20px; font-weight: 700; }
    .child-avatar { width: 50px; height: 50px; border-radius: 50%; background: var(--primary-gradient); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 20px; font-weight: 700; }

    .table-container { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    th { background: var(--bg); font-size: 12px; font-weight: 600; padding: 12px 14px; text-align: left; color: var(--text-secondary); border-bottom: 1px solid var(--border); }
    td { padding: 10px 14px; font-size: 14px; border-bottom: 1px solid var(--border); }
    tr:hover { background: var(--bg); }

    .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
    .badge-success { background: rgba(16,185,129,0.1); color: var(--success); }
    .badge-danger { background: rgba(239,68,68,0.1); color: var(--danger); }
    .badge-warning { background: rgba(245,158,11,0.1); color: var(--gold); }
    .badge-info { background: rgba(245,158,11,0.1); color: var(--primary-dark); }

    .dash-section { display: none; }
    .dash-section.active { display: block; }

    .toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; }
    .toast { padding: 12px 18px; border-radius: 10px; color: #fff; font-size: 14px; margin-bottom: 8px; animation: slideIn 0.3s; display: flex; align-items: center; gap: 10px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); }
    .toast-success { background: var(--success); }
    .toast-error { background: var(--danger); }
    .toast-info { background: var(--primary); }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    .btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 22px; border-radius: 8px; font-weight: 600; font-size: 14px; cursor: pointer; transition: all 0.3s; border: none; }
    .btn-primary { background: var(--primary-gradient); color: #fff; }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 15px rgba(245,158,11,0.35); }
    .btn-outline { background: transparent; border: 2px solid var(--border); color: var(--text); }
    .btn-sm { padding: 6px 14px; font-size: 12px; }

    .query-form { max-width: 600px; }
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: var(--text); }
    .form-group input, .form-group textarea, .form-group select {
      width: 100%; padding: 10px 14px; border: 1.5px solid var(--border);
      border-radius: 8px; background: var(--bg-card); color: var(--text); font-size: 14px;
    }
    .form-group input:focus, .form-group textarea:focus { border-color: var(--primary); outline: none; }

    .attendance-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(32px, 1fr)); gap: 4px; max-width: 350px; }
    .attendance-day { width: 100%; aspect-ratio: 1; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; }
    .att-present { background: rgba(16,185,129,0.15); color: var(--success); }
    .att-absent { background: rgba(239,68,68,0.15); color: var(--danger); }
    .att-late { background: rgba(245,158,11,0.15); color: var(--gold); }

    .progress-bar { height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; margin: 8px 0; }
    .progress-fill { height: 100%; border-radius: 4px; background: var(--primary-gradient); transition: width 0.8s; }

    @media(max-width: 1024px) {
      .sidebar { transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); }
      .main-content { margin-left: 0; }
      .hamburger { display: block; }
    }
    @media(max-width: 768px) { .main-content { padding: 16px; } }
  </style>
</head>
<body>
<div class="toast-container" id="toastContainer"></div>

<div class="dash-wrapper">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <i class="fas fa-users" style="font-size:24px;color:var(--primary-light);"></i>
      <div><h2>Fusion</h2><span>Parent Portal</span></div>
    </div>
    <nav class="sidebar-nav">
      <a href="#" class="active" onclick="showSection('dashboard')"><i class="fas fa-home"></i> Dashboard</a>
      <a href="#" onclick="showSection('marks')"><i class="fas fa-chart-bar"></i> Marks & Results</a>
      <a href="#" onclick="showSection('attendance')"><i class="fas fa-calendar-check"></i> Attendance</a>
      <a href="#" onclick="showSection('fees')"><i class="fas fa-money-bill-wave"></i> Fee Details</a>
      <a href="#" onclick="showSection('homework')"><i class="fas fa-tasks"></i> Homework Status</a>
      <a href="#" onclick="showSection('queries')"><i class="fas fa-question-circle"></i> Send Query</a>
      <a href="#" onclick="showSection('notifications')"><i class="fas fa-bell"></i> Notifications</a>
    </nav>
    <div class="sidebar-footer">
      <a href="#" onclick="handleLogout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
    </div>
  </aside>

  <div class="main-content">
    <div class="topbar">
      <div class="topbar-left">
        <button class="hamburger" onclick="document.getElementById('sidebar').classList.toggle('open')"><i class="fas fa-bars"></i></button>
        <h1 id="pageTitle">Dashboard</h1>
      </div>
      <div class="topbar-right">
        <button onclick="toggleTheme()" style="background:none;border:none;color:var(--text);font-size:18px;cursor:pointer;padding:8px;"><i class="fas fa-moon" id="themeIcon"></i></button>
        <div class="user-avatar" id="parentAvatar">P</div>
        <span id="parentName" style="font-weight:500;font-size:14px;">Parent</span>
      </div>
    </div>

    <!-- Dashboard Section -->
    <div class="dash-section active" id="sec-dashboard">
      <div id="childrenOverview"></div>
    </div>

    <!-- Marks Section -->
    <div class="dash-section" id="sec-marks">
      <div id="childrenMarks"></div>
    </div>

    <!-- Attendance Section -->
    <div class="dash-section" id="sec-attendance">
      <div id="childrenAttendance"></div>
    </div>

    <!-- Fees Section -->
    <div class="dash-section" id="sec-fees">
      <div id="childrenFees"></div>
    </div>

    <!-- Homework Section -->
    <div class="dash-section" id="sec-homework">
      <div id="childrenHomework"></div>
    </div>

    <!-- Queries Section -->
    <div class="dash-section" id="sec-queries">
      <div class="section-card">
        <h3><i class="fas fa-question-circle"></i> Send Query to School</h3>
        <form id="queryForm" class="query-form">
          <div class="form-group">
            <label>Regarding Child</label>
            <select id="queryChild"><option value="">Select your child</option></select>
          </div>
          <div class="form-group">
            <label>Subject</label>
            <select id="querySubject">
              <option value="">Select</option>
              <option>Academic Performance</option>
              <option>Fee Related</option>
              <option>Attendance</option>
              <option>General Query</option>
              <option>Other</option>
            </select>
          </div>
          <div class="form-group">
            <label>Message *</label>
            <textarea id="queryMessage" rows="4" required></textarea>
          </div>
          <button type="submit" class="btn btn-primary"><i class="fas fa-paper-plane"></i> Send Query</button>
          </form>
        </div>
        <div class="section-card">
          <h3><i class="fas fa-history"></i> My Queries</h3>
          <div id="parentQueriesList"></div>
        </div>
      </div>

      <!-- Notifications Section -->
      <div class="dash-section" id="sec-notifications">
        <div class="section-card">
          <h3><i class="fas fa-bell"></i> All Notices</h3>
          <div id="parentNotices"></div>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
const token = localStorage.getItem('fusion_token');
const user = JSON.parse(localStorage.getItem('fusion_user') || '{}');
if (!token || user.role !== 'parent') { window.location.href = '/'; }

function showToast(msg, type = 'info') {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = `toast toast-${type}`;
  const icons = { success: 'fa-check-circle', error: 'fa-exclamation-circle', info: 'fa-info-circle' };
  toast.innerHTML = `<i class="fas ${icons[type] || icons.info}"></i> ${msg}`;
  container.appendChild(toast);
  setTimeout(() => toast.remove(), 4000);
}

function showSection(id) {
  document.querySelectorAll('.dash-section').forEach(s => s.classList.remove('active'));
  document.getElementById('sec-' + id).classList.add('active');
  document.querySelectorAll('.sidebar-nav a').forEach(a => a.classList.remove('active'));
  const titles = { dashboard: 'Dashboard', marks: 'Marks & Results', attendance: 'Attendance', fees: 'Fee Details', homework: 'Homework Status', queries: 'Send Query', notifications: 'Notifications' };
  document.getElementById('pageTitle').textContent = titles[id] || 'Dashboard';
  if (id === 'dashboard') loadParentDashboard();
  if (id === 'marks') loadParentMarks();
  if (id === 'attendance') loadParentAttendance();
  if (id === 'fees') loadParentFees();
  if (id === 'homework') loadParentHomework();
  if (id === 'queries') { loadQueryChildren(); loadParentQueries(); }
  if (id === 'notifications') loadParentNotices();
}

async function api(url, opts = {}) {
  const res = await fetch(url, { ...opts, headers: { ...opts.headers, 'Authorization': 'Bearer ' + token, ...(!(opts.body instanceof FormData) ? { 'Content-Type': 'application/json' } : {}) } });
  if (res.status === 401) { handleLogout(); return null; }
  return res;
}

// ===== DASHBOARD =====
async function loadParentDashboard() {
  const container = document.getElementById('childrenOverview');
  try {
    const res = await api('/api/parent/children');
    const children = await res.json();
    if (!children.length) { container.innerHTML = '<div class="section-card"><p style="color:var(--text-secondary);">No children linked to your account.</p></div>'; return; }
    let html = '';
    for (const child of children) {
      const mRes = await api(`/api/marks/student/${child.student_id}?limit=1`);
      const marks = mRes ? await mRes.json() : [];
      const aRes = await api(`/api/attendance/student/${child.student_id}?limit=1`);
      const att = aRes ? await aRes.json() : {};
      const fRes = await api(`/api/fees/student/${child.student_id}?status=overdue`);
      const fees = fRes ? await fRes.json() : [];
      const attPct = att.percentage || 0;
      html += `
        <div class="child-card">
          <div class="child-header">
            <div><h2>${child.name}</h2>
              <span style="font-size:13px;color:var(--text-secondary);">Class ${child.class} ${child.section || ''} | Roll: ${child.roll_number || 'N/A'}</span>
            </div>
            <div class="child-avatar">${child.name.charAt(0)}</div>
          </div>
          <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:16px;margin-top:16px;">
            <div style="text-align:center;padding:12px;background:var(--bg);border-radius:8px;">
              <h3 style="font-size:22px;font-weight:800;color:var(--primary);">${attPct}%</h3>
              <p style="font-size:12px;color:var(--text-secondary);">Attendance</p>
            </div>
            <div style="text-align:center;padding:12px;background:var(--bg);border-radius:8px;">
              <h3 style="font-size:22px;font-weight:800;color:var(--success);">${marks.length > 0 ? marks[0].marks_obtained + '/' + marks[0].max_marks : 'N/A'}</h3>
              <p style="font-size:12px;color:var(--text-secondary);">Latest Marks</p>
            </div>
            <div style="text-align:center;padding:12px;background:var(--bg);border-radius:8px;">
              <h3 style="font-size:22px;font-weight:800;color:${fees.length > 0 ? 'var(--danger)' : 'var(--success)'};">${fees.length}</h3>
              <p style="font-size:12px;color:var(--text-secondary);">Pending Fees</p>
            </div>
          </div>
        </div>`;
    }
    container.innerHTML = html;
  } catch (err) { container.innerHTML = '<div class="section-card"><p style="color:var(--text-secondary);">Error loading data</p></div>'; }
}

// ===== MARKS =====
async function loadParentMarks() {
  const container = document.getElementById('childrenMarks');
  try {
    const res = await api('/api/parent/children');
    const children = await res.json();
    if (!children.length) { container.innerHTML = '<div class="section-card"><p style="color:var(--text-secondary);">No children found.</p></div>'; return; }
    let html = '';
    for (const child of children) {
      const mRes = await api(`/api/marks/student/${child.student_id}`);
      const marks = mRes ? await mRes.json() : [];
      html += `
        <div class="child-card">
          <div class="child-header"><h2>${child.name} - Class ${child.class}</h2><div class="child-avatar">${child.name.charAt(0)}</div></div>
          ${marks.length ? `
          <div class="table-container">
            <table>
              <thead><tr><th>Exam</th><th>Subject</th><th>Marks</th><th>Max</th><th>Grade</th><th>Date</th></tr></thead>
              <tbody>
                ${marks.map(m => `<tr><td>${m.exam_name}</td><td>${m.subject}</td><td><strong>${m.marks_obtained}</strong></td><td>${m.max_marks}</td><td><span class="badge ${m.marks_obtained >= (m.max_marks * 0.6) ? 'badge-success' : 'badge-danger'}">${m.grade || (m.marks_obtained >= (m.max_marks * 0.6) ? 'Pass' : 'Fail')}</span></td><td>${new Date(m.created_at).toLocaleDateString()}</td></tr>`).join('')}
              </tbody>
            </table>
          </div>` : `<p style="color:var(--text-secondary);">No marks data yet.</p>`}
        </div>`;
    }
    container.innerHTML = html;
  } catch (err) { container.innerHTML = '<div class="section-card"><p style="color:var(--text-secondary);">Error loading marks</p></div>'; }
}

// ===== ATTENDANCE =====
async function loadParentAttendance() {
  const container = document.getElementById('childrenAttendance');
  try {
    const res = await api('/api/parent/children');
    const children = await res.json();
    if (!children.length) { container.innerHTML = '<div class="section-card"><p style="color:var(--text-secondary);">No children found.</p></div>'; return; }
    let html = '';
    for (const child of children) {
      const aRes = await api(`/api/attendance/student/${child.student_id}`);
      const aRes = await api(`/api/attendance/student/${child.student_id}`);
      const attData = aRes ? await aRes.json() : {};
      const records = attData.records || [];
      const pct = attData.percentage || 0;
      html += `
        <div class="child-card">
          <div class="child-header"><h2>${child.name} - Class ${child.class}</h2><div class="child-avatar">${child.name.charAt(0)}</div></div>
          <div style="margin-bottom:12px;">
            <div style="display:flex;justify-content:space-between;font-size:14px;">
              <span>Overall Attendance</span>
              <span><strong>${pct}%</strong></span>
            </div>
            <div class="progress-bar"><div class="progress-fill" style="width:${Math.min(pct, 100)}%"></div></div>
          </div>
          ${records.length ? `
          <p style="font-size:13px;color:var(--text-secondary);margin-bottom:8px;">Last 30 days:</p>
          <div class="attendance-grid">
            ${records.slice(0, 30).map(r => {
              const cls = r.status === 'present' ? 'att-present' : r.status === 'absent' ? 'att-absent' : 'att-late';
              const day = new Date(r.date).getDate();
              return `<div class="attendance-day ${cls}" title="${r.date}: ${r.status}">${day}</div>`;
            }).join('')}
          </div>
          <div style="display:flex;gap:16px;margin-top:12px;font-size:12px;color:var(--text-secondary);">
            <span><span style="display:inline-block;width:12px;height:12px;border-radius:3px;background:rgba(16,185,129,0.15);vertical-align:middle;margin-right:4px;"></span> Present</span>
            <span><span style="display:inline-block;width:12px;height:12px;border-radius:3px;background:rgba(239,68,68,0.15);vertical-align:middle;margin-right:4px;"></span> Absent</span>
            <span><span style="display:inline-block;width:12px;height:12px;border-radius:3px;background:rgba(245,158,11,0.15);vertical-align:middle;margin-right:4px;"></span> Late</span>
          </div>` : `<p style="color:var(--text-secondary);">No attendance records yet.</p>`}
        </div>`;
    }
    container.innerHTML = html;
  } catch (err) { container.innerHTML = '<div class="section-card"><p style="color:var(--text-secondary);">Error loading attendance</p></div>'; }
}

// ===== FEES =====
async function loadParentFees() {
  const container = document.getElementById('childrenFees');
  try {
    const res = await api('/api/parent/children');
    const children = await res.json();
    if (!children.length) { container.innerHTML = '<div class="section-card"><p style="color:var(--text-secondary);">No children found.</p></div>'; return; }
    let html = '';
    for (const child of children) {
      const fRes = await api(`/api/fees/student/${child.student_id}`);
      const fees = fRes ? await fRes.json() : [];
      html += `
        <div class="child-card">
          <div class="child-header"><h2>${child.name} - Fee Details</h2><div class="child-avatar">${child.name.charAt(0)}</div></div>
          ${fees.length ? `
          <div class="table-container">
            <table>
              <thead><tr><th>Fee Type</th><th>Due Date</th><th>Amount</th><th>Status</th><th>Paid On</th></tr></thead>
              <tbody>
                ${fees.map(f => `
                  <tr>
                    <td>${f.fee_type || 'Tuition Fee'}</td>
                    <td>${f.due_date ? new Date(f.due_date).toLocaleDateString() : 'N/A'}</td>
                    <td><strong>₹${f.amount || f.fee_amount || 0}</strong></td>
                    <td><span class="badge ${f.status === 'paid' ? 'badge-success' : f.status === 'overdue' ? 'badge-danger' : 'badge-warning'}">${f.status}</span></td>
                    <td>${f.paid_date ? new Date(f.paid_date).toLocaleDateString() : '-'}</td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>` : `<p style="color:var(--text-secondary);">No fee records found.</p>`}
        </div>`;
    }
    container.innerHTML = html;
  } catch (err) { container.innerHTML = '<div class="section-card"><p style="color:var(--text-secondary);">Error loading fees</p></div>'; }
}

// ===== HOMEWORK =====
async function loadParentHomework() {
  const container = document.getElementById('childrenHomework');
  try {
    const res = await api('/api/parent/children');
    const children = await res.json();
    if (!children.length) { container.innerHTML = '<div class="section-card"><p style="color:var(--text-secondary);">No children found.</p></div>'; return; }
    let html = '';
    for (const child of children) {
      const hRes = await api(`/api/homework/student/${child.student_id}`);
      const hw = hRes ? await hRes.json() : [];
      html += `
        <div class="child-card">
          <div class="child-header"><h2>${child.name} - Homework</h2><div class="child-avatar">${child.name.charAt(0)}</div></div>
          ${hw.length ? `
          <div class="table-container">
            <table>
              <thead><tr><th>Subject</th><th>Title</th><th>Due Date</th><th>Status</th></tr></thead>
              <tbody>
                ${hw.map(h => `<tr>
                  <td>${h.subject}</td>
                  <td>${h.title}</td>
                  <td>${h.due_date ? new Date(h.due_date).toLocaleDateString() : '-'}</td>
                  <td><span class="badge ${h.is_completed ? 'badge-success' : new Date(h.due_date) < new Date() ? 'badge-danger' : 'badge-warning'}">${h.is_completed ? 'Completed' : new Date(h.due_date) < new Date() ? 'Overdue' : 'Pending'}</span></td>
                </tr>`).join('')}
              </tbody>
            </table>
          </div>` : `<p style="color:var(--text-secondary);">No homework assigned yet.</p>`}
        </div>`;
    }
    container.innerHTML = html;
  } catch (err) { container.innerHTML = '<div class="section-card"><p style="color:var(--text-secondary);">Error loading homework</p></div>'; }
}

// ===== QUERIES =====
async function loadQueryChildren() {
  try {
    const res = await api('/api/parent/children');
    const children = await res.json();
    const select = document.getElementById('queryChild');
    select.innerHTML = '<option value="">Select your child</option>' + children.map(c => `<option value="${c.student_id}">${c.name} - Class ${c.class}</option>`).join('');
  } catch (err) {}
}

document.getElementById('queryForm')?.addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = e.target.querySelector('button[type="submit"]');
  btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending...';
  try {
    const res = await api('/api/doubts', {
      method: 'POST',
      body: JSON.stringify({
        student_id: document.getElementById('queryChild').value,
        subject: document.getElementById('querySubject').value,
        question_text: document.getElementById('queryMessage').value
      })
    });
    if (res && res.ok) { showToast('✅ Query sent successfully!', 'success'); e.target.reset(); }
    else { showToast('Failed to send query', 'error'); }
  } catch (err) { showToast('Error', 'error'); }
  finally { btn.disabled = false; btn.innerHTML = '<i class="fas fa-paper-plane"></i> Send Query'; }
});

async function loadParentQueries() {
  const container = document.getElementById('parentQueriesList');
  try {
    const res = await api('/api/doubts/parent');
    const queries = res ? await res.json() : [];
    if (!queries.length) { container.innerHTML = '<p style="color:var(--text-secondary);">No queries submitted yet.</p>'; return; }
    container.innerHTML = queries.map(q => `
      <div style="padding:14px;border:1px solid var(--border);border-radius:8px;margin-bottom:10px;">
        <div style="display:flex;justify-content:space-between;">
          <strong>${q.subject}</strong>
          <span class="badge ${q.is_resolved ? 'badge-success' : 'badge-warning'}">${q.is_resolved ? 'Resolved' : 'Pending'}</span>
        </div>
        <p style="font-size:14px;margin:8px 0;">${q.question_text}</p>
        ${q.answer_text ? `<div style="background:var(--bg);padding:10px;border-radius:6px;border-left:3px solid var(--success);font-size:13px;"><strong>Reply:</strong> ${q.answer_text}</div>` : ''}
        <p style="font-size:11px;color:var(--text-light);margin-top:6px;">${new Date(q.created_at).toLocaleString()}</p>
      </div>
    `).join('');
  } catch (err) { container.innerHTML = '<p style="color:var(--text-secondary);">Error loading queries</p>'; }
}

// ===== NOTICES =====
async function loadParentNotices() {
  const container = document.getElementById('parentNotices');
  try {
    const res = await api('/api/notices');
    const notices = res ? await res.json() : [];
    if (!notices.length) { container.innerHTML = '<p style="color:var(--text-secondary);">No notices at this time.</p>'; return; }
    container.innerHTML = notices.map(n => `
      <div style="padding:16px;border:1px solid var(--border);border-radius:10px;margin-bottom:12px;">
        <h4 style="font-size:16px;font-weight:600;display:flex;align-items:center;gap:8px;"><i class="fas fa-bullhorn" style="color:var(--primary);font-size:14px;"></i> ${n.title}</h4>
        <p style="font-size:14px;margin:8px 0;">${n.content}</p>
        <p style="font-size:11px;color:var(--text-light);">${new Date(n.created_at).toLocaleString()} ${n.created_by ? '| by ' + n.created_by : ''}</p>
      </div>
    `).join('');
  } catch (err) { container.innerHTML = '<p style="color:var(--text-secondary);">Error loading notices</p>'; }
}

async function handleLogout() {
  try { await api('/api/auth/logout', { method: 'POST' }); } catch (e) {}
  localStorage.removeItem('fusion_token');
  localStorage.removeItem('fusion_user');
  window.location.href = '/';
}

function toggleTheme() {
  const html = document.documentElement;
  const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  localStorage.setItem('fusion-theme', next);
  document.getElementById('themeIcon').className = next === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
}

const savedTheme = localStorage.getItem('fusion-theme') || 'light';
document.documentElement.setAttribute('data-theme', savedTheme);
document.getElementById('themeIcon').className = savedTheme === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
document.getElementById('parentName').textContent = user.name || 'Parent';
document.getElementById('parentAvatar').textContent = (user.name || 'P').charAt(0).toUpperCase();
loadParentDashboard();
</script>
</body>
</html>
